server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown paths serve index.html so
    # the Next.js client-side router takes over
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable static assets indefinitely
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache public assets for a day
    location /fonts/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    location /images/ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
